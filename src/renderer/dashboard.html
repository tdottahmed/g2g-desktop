<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
<title>G2G Automation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: #161b27;
    border-bottom: 1px solid #1e2535;
    -webkit-app-region: drag;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .app-logo { font-size: 20px; }
  .app-title { font-size: 15px; font-weight: 600; color: #f1f5f9; letter-spacing: 0.3px; }
  .header button { -webkit-app-region: no-drag; }

  /* ── Update banner ── */
  #update-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    background: #1c2a4a;
    border-bottom: 1px solid #2563eb55;
    font-size: 13px;
    color: #93c5fd;
  }
  #update-banner.show { display: flex; }
  #update-banner .banner-left { display: flex; align-items: center; gap: 8px; }
  #update-banner .banner-actions { display: flex; gap: 8px; }
  .btn-banner {
    padding: 4px 12px; border-radius: 5px; border: 1px solid #2563eb;
    background: #1d4ed8; color: #fff; font-size: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-banner:hover { background: #2563eb; }
  .btn-banner.secondary {
    background: transparent; border-color: #334155; color: #64748b;
  }
  .btn-banner.secondary:hover { background: #1e2535; color: #94a3b8; }
  #update-progress-bar {
    height: 3px; background: #2563eb; border-radius: 2px;
    width: 0; transition: width 0.3s;
    margin-top: 4px;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #12161f;
    border-bottom: 1px solid #1e2535;
    font-size: 13px;
  }
  .status-left { display: flex; align-items: center; gap: 16px; }
  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .dot-idle     { background: #64748b; }
  .dot-running  { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
  .dot-watching { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot-error    { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .dot-connected    { background: #22c55e; }
  .dot-disconnected { background: #ef4444; }

  .status-chip {
    display: flex; align-items: center;
    font-size: 12px; color: #94a3b8;
  }
  .status-chip span { font-weight: 500; color: #cbd5e1; }

  .run-stats {
    display: flex; gap: 14px;
    font-size: 12px; color: #475569;
  }
  .run-stats .stat-val { color: #cbd5e1; font-weight: 500; }
  .run-stats .stat-ok  { color: #4ade80; }
  .run-stats .stat-err { color: #f87171; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: #161b27;
    border-bottom: 1px solid #1e2535;
  }
  .sep { width: 1px; height: 24px; background: #1e2535; margin: 0 4px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border: 1px solid #2d3748;
    border-radius: 6px;
    background: #1e2535;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover  { background: #263044; border-color: #3d4f6e; color: #f1f5f9; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary  { background: #1d4ed8; border-color: #2563eb; color: #fff; }
  .btn.primary:hover { background: #2563eb; }
  .btn.success  { background: #166534; border-color: #16a34a; color: #bbf7d0; }
  .btn.success:hover { background: #15803d; }
  .btn.danger   { background: #7f1d1d; border-color: #dc2626; color: #fecaca; }
  .btn.danger:hover { background: #991b1b; }
  .btn.warning  { background: #78350f; border-color: #d97706; color: #fde68a; }
  .btn.warning:hover { background: #92400e; }
  .btn.icon-only { padding: 7px 10px; }

  .icon { font-size: 15px; line-height: 1; }

  /* ── Log panel ── */
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #475569;
    background: #0f1117;
    border-bottom: 1px solid #1a2030;
  }
  .log-header .log-count { font-size: 11px; color: #334155; font-weight: 400; text-transform: none; letter-spacing: 0; }

  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px;
    font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    background: #0a0d14;
  }
  #log-panel::-webkit-scrollbar { width: 6px; }
  #log-panel::-webkit-scrollbar-track { background: transparent; }
  #log-panel::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 3px; }

  .log-line { display: flex; gap: 10px; }
  .log-time { color: #334155; flex-shrink: 0; font-size: 11.5px; padding-top: 1px; }
  .log-text { color: #94a3b8; word-break: break-all; }
  .log-text.success { color: #4ade80; }
  .log-text.error   { color: #f87171; }
  .log-text.warn    { color: #fbbf24; }
  .log-text.info    { color: #60a5fa; }
  .log-text.app     { color: #818cf8; }

  .log-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%;
    color: #1e2535;
    font-size: 14px;
    gap: 8px;
  }
  .log-empty .log-empty-icon { font-size: 32px; }

  /* ── Footer ── */
  .footer {
    padding: 6px 20px;
    background: #0f1117;
    border-top: 1px solid #1a2030;
    font-size: 11px;
    color: #334155;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-left { display: flex; gap: 16px; }
  .footer span  { color: #475569; }
  .footer .version { color: #1e2535; font-size: 10.5px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="app-logo">🤖</span>
    <span class="app-title">G2G Automation</span>
  </div>
  <button class="btn icon-only" id="btn-settings" title="Settings">⚙️</button>
</div>

<!-- Update banner -->
<div id="update-banner">
  <div class="banner-left">
    <span id="update-banner-icon">🆕</span>
    <span id="update-banner-text">A new version is available.</span>
    <div id="update-progress-bar"></div>
  </div>
  <div class="banner-actions">
    <button class="btn-banner" id="btn-update-action">Download</button>
    <button class="btn-banner secondary" id="btn-update-dismiss">Dismiss</button>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-left">
    <div class="status-chip">
      <span class="status-dot dot-idle" id="runner-dot"></span>
      Runner: <span id="runner-status-text" style="margin-left:4px">Idle</span>
    </div>
    <div class="status-chip">
      <span class="status-dot dot-disconnected" id="api-dot"></span>
      API: <span id="api-status-text" style="margin-left:4px">—</span>
    </div>
    <div class="run-stats" id="run-stats" style="display:none">
      <span>Last run: <span class="stat-ok" id="stat-ok">0</span> posted · <span class="stat-err" id="stat-err">0</span> failed</span>
    </div>
  </div>
  <button class="btn" id="btn-test" style="padding:4px 10px; font-size:11px;">Test Connection</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn primary" id="btn-run">▶ Run Once</button>
  <button class="btn success" id="btn-watch">👁 Start Watch</button>
  <button class="btn" id="btn-stop" disabled>⏹ Stop</button>
  <div class="sep"></div>
  <button class="btn warning" id="btn-delete">🗑 Delete All Offers</button>
  <div class="sep"></div>
  <button class="btn icon-only" id="btn-clear" title="Clear logs">🧹</button>
</div>

<!-- Log header -->
<div class="log-header">
  <span>Live Output</span>
  <span class="log-count" id="log-count">0 lines</span>
</div>

<!-- Log panel -->
<div id="log-panel">
  <div class="log-empty" id="log-empty">
    <span class="log-empty-icon">📋</span>
    <span>No output yet. Press Run Once or Start Watch to begin.</span>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-left">
    <span>Last activity: <span id="last-run">—</span></span>
  </div>
  <span class="version" id="app-version"></span>
</div>

<script src="dashboard.js"></script>
</body>
</html>
